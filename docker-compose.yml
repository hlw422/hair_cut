version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: haircut-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-haircut_root_2024}
      MYSQL_DATABASE: ${MYSQL_DB:-haircut}
      MYSQL_USER: ${MYSQL_USER:-haircut_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-haircut_dev_2024}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./docker/mysql/conf.d:/etc/mysql/conf.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - haircut-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: haircut-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-haircut_redis_2024}
    volumes:
      - redis_data:/data
    networks:
      - haircut-network

  # Elasticsearch 搜索引擎
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: haircut-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - TZ=Asia/Shanghai
    ports:
      - "${ES_PORT:-9200}:9200"
      - "${ES_PORT_TRANSPORT:-9300}:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - haircut-network

  # Kibana (可选，用于ES可视化)
  kibana:
    image: kibana:8.11.0
    container_name: haircut-kibana
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      TZ=Asia/Shanghai
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    depends_on:
      - elasticsearch
    networks:
      - haircut-network

  # MongoDB 文档数据库
  mongodb:
    image: mongo:6.0
    container_name: haircut-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-mongo_admin_2024}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-haircut_logs}
      TZ:Asia/Shanghai
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - haircut-network

  # RabbitMQ 消息队列
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: haircut-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-haircut}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbitmq_2024}
      TZ=Asia/Shanghai
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - haircut-network

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: haircut-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin_2024}
      TZ=Asia/Shanghai
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - haircut-network

volumes:
  mysql_data:
  redis_data:
  es_data:
  mongo_data:
  rabbitmq_data:
  minio_data:

networks:
  haircut-network:
    driver: bridge
